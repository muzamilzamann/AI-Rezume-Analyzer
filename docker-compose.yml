services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    env_file:
      - ./backend/.env
    environment:
      # Override so locally-stored file URLs resolve from the browser via the
      # exposed backend port (Neon DB + JWT secret still come from .env).
      BACKEND_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
